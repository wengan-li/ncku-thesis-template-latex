name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Artifact version. Leave empty for dev-<short-sha>; release versions use vMAJOR.MINOR.PATCH.YYMMDDhhmmss (UTC)."
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build and verify release assets
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve and validate version
        shell: bash
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi

          if [[ "$VERSION" != dev-* ]]; then
            if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+\.[0-9]{12}$ ]]; then
              echo "Invalid release version: $VERSION" >&2
              echo "Expected vMAJOR.MINOR.PATCH.YYMMDDhhmmss using UTC." >&2
              exit 1
            fi
            python3 - "${VERSION##*.}" <<'PY'
          import datetime
          import sys

          datetime.datetime.strptime(sys.argv[1], "%y%m%d%H%M%S")
          PY
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Check committed whitespace
        run: git show --check --format= HEAD

      - name: Build and verify release assets
        uses: xu-cheng/texlive-action@v3
        with:
          texlive_version: 2026
          os: alpine
          scheme: full
          run: |
            apk add --no-cache git just poppler-utils unzip
            just test
            just release

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-assets-${{ env.VERSION }}
          path: |
            build/release/ncku-thesis-template-latex.zip
            build/release/example-cover.pdf
            build/release/example-thesis-chi.pdf
            build/release/example-thesis-eng.pdf
            build/release/example-thesis-demo.pdf
            build/release/example-legacy-defense-certificate-master.pdf
            build/release/example-legacy-defense-certificate-phd.pdf
          if-no-files-found: error
          retention-days: 30

  github-release:
    name: Attach verified assets to GitHub release
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Validate tag version
        shell: bash
        run: |
          VERSION="$GITHUB_REF_NAME"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+\.[0-9]{12}$ ]]; then
            echo "Invalid release tag: $VERSION" >&2
            exit 1
          fi
          python3 - "${VERSION##*.}" <<'PY'
          import datetime
          import sys

          datetime.datetime.strptime(sys.argv[1], "%y%m%d%H%M%S")
          PY
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Download verified workflow artifact
        uses: actions/download-artifact@v6
        with:
          name: release-assets-${{ env.VERSION }}
          path: release-artifacts

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          assets=(release-artifacts/*)
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
              --verify-tag \
              --generate-notes \
              --title "$GITHUB_REF_NAME"
          fi
