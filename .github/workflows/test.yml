name: Test

on:
  push:
    branches:
      - main
      - "feat/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Run required test gate
        uses: xu-cheng/texlive-action@v3
        with:
          texlive_version: 2026
          os: alpine
          scheme: full
          run: |
            apk add --no-cache git just poppler-utils
            just test

      - name: Upload test PDF
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: thesis-test-output
          path: |
            build/thesis.pdf
            build/thesis.log
          if-no-files-found: warn
          retention-days: 7
